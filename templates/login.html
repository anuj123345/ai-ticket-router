<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AI Enterprise Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --brand: #6366f1;
      --brand-dark: #4f46e5;
      --surface: #ffffff;
      --bg: #f8f9fc;
      --border: #e5e7eb;
      --text-1: #111827;
      --text-2: #6b7280;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-split {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 560px;
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    /* Left panel */
    .auth-brand {
      flex: 1;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
    }
    .auth-brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .auth-brand-logo-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .auth-brand-tagline h2 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .auth-brand-tagline p {
      font-size: 0.95rem;
      opacity: 0.85;
      line-height: 1.6;
    }
    .auth-brand-modules {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .auth-module-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .auth-module-pill i { font-size: 1rem; opacity: 0.9; }
    /* Right panel */
    .auth-form-panel {
      flex: 1;
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .auth-form-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 6px;
    }
    .auth-form-sub {
      font-size: 0.9rem;
      color: var(--text-2);
      margin-bottom: 32px;
    }
    .auth-form-sub a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 6px;
    }
    .form-control {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      color: var(--text-1);
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      outline: none;
    }
    .mb-form { margin-bottom: 18px; }
    .btn-auth {
      width: 100%;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
      margin-top: 8px;
    }
    .btn-auth:hover { background: var(--brand-dark); transform: translateY(-1px); }
    .btn-auth:active { transform: translateY(0); }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 99px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: color 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      z-index: 100;
    }
    .back-btn:hover {
      color: var(--text-1);
      border-color: #c4c7d0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      transform: translateX(-2px);
    }
    @media (max-width: 640px) {
      .auth-brand { display: none; }
      .auth-form-panel { padding: 40px 28px; }
      .back-btn { top: 14px; left: 14px; }
    }
  </style>
</head>
<body>

<a href="/" class="back-btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Back to Home
</a>

<div class="auth-split">
  <!-- Left: brand panel -->
  <div class="auth-brand">
    <div class="auth-brand-logo">
      <div class="auth-brand-logo-icon"><i class="bi bi-robot"></i></div>
      AI Enterprise Platform
    </div>
    <div class="auth-brand-tagline">
      <h2>Your AI-powered workplace assistant</h2>
      <p>Three intelligent modules working together to streamline support, operations, and onboarding.</p>
    </div>
    <div class="auth-brand-modules">
      <div class="auth-module-pill"><i class="bi bi-ticket-perforated"></i> AI Ticket Router</div>
      <div class="auth-module-pill"><i class="bi bi-bar-chart-line"></i> Ops Dashboard</div>
      <div class="auth-module-pill"><i class="bi bi-search"></i> Smart Search</div>
    </div>
  </div>

  <!-- Right: form -->
  <div class="auth-form-panel">
    <div class="auth-form-title">Welcome back</div>
    <div class="auth-form-sub">Don't have an account? <a href="/register">Create one</a></div>

    {% if error %}
    <div class="auth-error"><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-form">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@company.com"
               value="{{ email or '' }}" required autocomplete="email" />
      </div>
      <div class="mb-form">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••"
               required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-auth">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
      </button>
    </form>
  </div>
</div>

</body>
</html>
