<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Ticket Router{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">
      <div class="brand-icon"><i class="bi bi-robot"></i></div>
      AI Ticket Router
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list fs-5"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <div class="navbar-nav ms-auto d-flex flex-row gap-1">
        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
          <i class="bi bi-plus-circle"></i> New Ticket
        </a>
        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/dashboard">
          <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- AI Loading overlay -->
<div class="ai-loading-overlay" id="aiOverlay">
  <div class="ai-spinner"></div>
  <div style="text-align:center">
    <div style="font-weight:700;font-size:1rem;margin-bottom:4px">AI is processing your ticket</div>
    <div style="color:var(--text-2);font-size:0.875rem">This takes about 5–10 seconds</div>
  </div>
